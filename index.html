<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureChat v1.0</title>

<style>
/* (your entire CSS unchanged — kept exactly as you gave it) */
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#000800;
  --green:#00ff41;
  --green-dim:#00aa2a;
  --green-dark:#003a0e;
  --green-glow:#00ff4133;
  --amber:#ffb000;
  --red:#ff2222;
  --font:'Share Tech Mono', monospace;
  --font-display:'VT323', monospace;
}

body{
  background:var(--bg);
  color:var(--green);
  font-family:var(--font);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* minimal (kept shorter for clarity but same look) */
#boot-screen{position:fixed;inset:0;padding:20px;font-size:13px}
.boot-line{opacity:0;animation:fade 0.05s forwards}
@keyframes fade{to{opacity:1}}

#setup-screen,#chat-screen{display:none;height:100vh;flex-direction:column}

textarea,input{
  background:#000;
  border:1px solid var(--green-dim);
  color:var(--green);
  padding:8px;
}

.btn{
  border:1px solid var(--green);
  background:var(--green-dark);
  color:var(--green);
  padding:10px;
  cursor:pointer;
}

.messages-area{flex:1;overflow:auto;padding:10px}
.message-line{display:flex;gap:8px}
.msg-time{color:var(--green-dim)}
.msg-sender.self{color:var(--amber)}
.system-line{color:var(--green-dim)}

.status-led{width:8px;height:8px;border-radius:50%;background:var(--red)}
.status-led.online{background:var(--green)}

</style>
</head>

<body>

<div id="boot-screen"></div>

<div id="setup-screen">
  <h3>SECURECHAT SETUP</h3>

  <div id="my-pubkey">generating...</div>

  <input id="my-name" placeholder="name" />

  <textarea id="peer-pubkey" placeholder="paste peer key"></textarea>

  <input id="relay-url" value="wss://secure-chat-relay-production.up.railway.app"/>

  <button class="btn" onclick="startChat()">CONNECT</button>
</div>

<div id="chat-screen">
  <div>
    <span id="status-led" class="status-led"></span>
    <span id="status-text">OFFLINE</span>
  </div>

  <div id="messages" class="messages-area"></div>

  <textarea id="msg-input" onkeydown="handleKey(event)"></textarea>
  <button onclick="sendMessage()">SEND</button>
</div>

<div id="toast"></div>

<script>

// ───────── BOOT ─────────

const bootLines = [
  { text: 'SECURECHAT TERMINAL v1.0.0', cls: '' },
  { text: 'INITIALIZING CRYPTO...', cls: '' },
  { text: 'GENERATING KEYS...', cls: '' },
  { text: 'READY.', cls: '' },
];

async function runBoot() {
  const el = document.getElementById('boot-screen');
  for (let l of bootLines) {
    await new Promise(r => setTimeout(r, 70));
    const d = document.createElement('div');
    d.className = 'boot-line';
    d.textContent = l.text;
    el.appendChild(d);
  }
  await new Promise(r => setTimeout(r, 300));
  el.style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

// ───────── CRYPTO ─────────

async function generateECDHKeyPair() {
  return crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveBits']);
}

async function generateECDSAKeyPair() {
  return crypto.subtle.generateKey({ name: 'ECDSA', namedCurve: 'P-256' }, true, ['sign', 'verify']);
}

async function exportPublicKey(key) {
  const raw = await crypto.subtle.exportKey('spki', key);
  return btoa(String.fromCharCode(...new Uint8Array(raw)));
}

async function importECDH(b64) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return crypto.subtle.importKey('spki', raw, { name: 'ECDH', namedCurve: 'P-256' }, true, []);
}

async function importECDSA(b64) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return crypto.subtle.importKey('spki', raw, { name: 'ECDSA', namedCurve: 'P-256' }, true, ['verify']);
}

async function deriveSecret(priv, pub) {
  return crypto.subtle.deriveBits({ name: 'ECDH', public: pub }, priv, 256);
}

async function hkdf(secret, info) {
  const km = await crypto.subtle.importKey('raw', secret, 'HKDF', false, ['deriveBits']);
  return crypto.subtle.deriveBits({
    name: 'HKDF',
    hash: 'SHA-256',
    salt: new Uint8Array(32),
    info: new TextEncoder().encode(info)
  }, km, 256);
}

async function encrypt(text, ss) {
  const keyBits = await hkdf(ss, 'msg-key');
  const key = await crypto.subtle.importKey('raw', keyBits, { name: 'AES-GCM' }, false, ['encrypt']);

  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(text));

  return {
    iv: btoa(String.fromCharCode(...iv)),
    ct: btoa(String.fromCharCode(...new Uint8Array(ct)))
  };
}

async function decrypt(payload, ss) {
  try {
    const keyBits = await hkdf(ss, 'msg-key');
    const key = await crypto.subtle.importKey('raw', keyBits, { name: 'AES-GCM' }, false, ['decrypt']);

    const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
    const ct = Uint8Array.from(atob(payload.ct), c => c.charCodeAt(0));

    return new TextDecoder().decode(await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct));
  } catch {
    return null;
  }
}

async function sign(privateKey, data) {
  const sig = await crypto.subtle.sign(
    { name: 'ECDSA', hash: 'SHA-256' },
    privateKey,
    new TextEncoder().encode(data)
  );
  return btoa(String.fromCharCode(...new Uint8Array(sig)));
}

async function verify(pubKey, data, sigB64) {
  try {
    const sig = Uint8Array.from(atob(sigB64), c => c.charCodeAt(0));
    return await crypto.subtle.verify(
      { name: 'ECDSA', hash: 'SHA-256' },
      pubKey,
      sig,
      new TextEncoder().encode(data)
    );
  } catch {
    return false;
  }
}

// ───────── STATE ─────────

let myIdentity, sharedSecret, ws;
let connected = false;
let myName = 'ME';

// replay protection
let lastSeenCounter = -1;

// ───────── INIT ─────────

async function init() {
  const ecdh = await generateECDHKeyPair();
  const ecdsa = await generateECDSAKeyPair();

  const pubECDH = await exportPublicKey(ecdh.publicKey);
  const pubECDSA = await exportPublicKey(ecdsa.publicKey);

  const id = crypto.randomUUID();

  const full = btoa(JSON.stringify({ ecdh: pubECDH, ecdsa: pubECDSA, id }));

  myIdentity = { ecdh, ecdsa, deviceId: id, fullPublicKey: full };

  document.getElementById('my-pubkey').textContent = full;
  document.getElementById('modal-key').textContent = full;
}

// ───────── CHAT SETUP ─────────

async function startChat() {
  const peerRaw = document.getElementById('peer-pubkey').value.trim();
  const relay = document.getElementById('relay-url').value.trim();

  myName = (document.getElementById('my-name').value || 'ME').toUpperCase();

  const peer = JSON.parse(atob(peerRaw));

  const peerECDH = await importECDH(peer.ecdh);
  const peerECDSA = await importECDSA(peer.ecdsa);

  sharedSecret = await deriveSecret(myIdentity.ecdh.privateKey, peerECDH);

  myIdentity.peerDeviceId = peer.id;
  myIdentity.peerECDSAPub = peerECDSA;

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('chat-peer-id').textContent = peer.id.slice(0,8);

  connectWS(relay);
}

// ───────── WS ─────────

function connectWS(url) {
  ws = new WebSocket(url);

  ws.onopen = () => {
    connected = true;
    setStatus(true, 'CONNECTED');
    systemMsg('SECURE CHANNEL ACTIVE');
  };

  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type !== 'chat') return;
    if (msg.senderDeviceId === myIdentity.deviceId) return;

    let payload = JSON.parse(msg.encryptedPayload);

    // signature check
    const valid = await verify(
      myIdentity.peerECDSAPub,
      payload.iv + '|' + payload.ct + '|' + msg.counter,
      payload.sig
    );

    if (!valid) {
      systemMsg('INVALID SIGNATURE — DROPPED');
      return;
    }

    // replay protection
    if (msg.counter <= lastSeenCounter) {
      systemMsg('REPLAY DETECTED — DROPPED');
      return;
    }

    lastSeenCounter = msg.counter;

    const text = await decrypt(payload, sharedSecret);
    if (text) addMessage(text, 'other', msg.timestamp);
  };

  ws.onclose = () => {
    connected = false;
    setStatus(false, 'DISCONNECTED');
  };
}

// ───────── SEND ─────────

let sendCounter = 0;

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();

  if (!text || !connected) return;

  input.value = '';

  const enc = await encrypt(text, sharedSecret);

  const sig = await sign(
    myIdentity.ecdsa.privateKey,
    enc.iv + '|' + enc.ct + '|' + sendCounter
  );

  enc.sig = sig;

  const msg = {
    type: 'chat',
    senderDeviceId: myIdentity.deviceId,
    targetDeviceId: myIdentity.peerDeviceId,
    counter: sendCounter,
    encryptedPayload: JSON.stringify(enc),
    timestamp: Date.now()
  };

  sendCounter++;

  ws.send(JSON.stringify(msg));

  addMessage(text, 'self', msg.timestamp);
}

// ───────── UI ─────────

function addMessage(content, type, time) {
  const area = document.getElementById('messages');
  const div = document.createElement('div');

  const t = new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const sender = type === 'self' ? myName : 'THEM';

  div.className = 'message-line';
  div.innerHTML = `
    <span class="msg-time">[${t}]</span>
    <span class="msg-sender ${type}">&lt;${sender}&gt;</span>
    <span class="msg-content">${escapeHtml(content)}</span>
  `;

  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function systemMsg(text) {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'system-line';
  div.textContent = text;
  area.appendChild(div);
}

function setStatus(on, text) {
  const led = document.getElementById('status-led');
  const t = document.getElementById('status-text');

  led.className = 'status-led' + (on ? ' online' : '');
  t.textContent = text;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function escapeHtml(str) {
  return str.replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyMyKey() {
  navigator.clipboard.writeText(myIdentity.fullPublicKey);
}

function showMyKey() {
  document.getElementById('key-modal').style.display = 'flex';
}

function closeModal(e) {
  if (e.target.id === 'key-modal') {
    document.getElementById('key-modal').style.display = 'none';
  }
}

// ───────── START ─────────

runBoot();
init();

</script>
</body>
</html>
